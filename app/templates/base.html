<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="{% block body_class %}{% endblock %}">
    {% block header %}
        <header>
            <div class="container">
                <h1>Система аудита веб-сайтов</h1>
                <nav>
                    <a href="/web">Главная</a>
                    <a href="/web/history">История проверок</a>
                    <a href="/docs">Swagger API</a>
                </nav>
            </div>
        </header>
    {% endblock %}

    <main class="{% block main_wrapper_class %}container{% endblock %} {% block main_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>
    <script>
        (function () {
            const stickyHeaders = document.querySelectorAll(".history-page header.history-header, .audit-page header.audit-header");
            if (!stickyHeaders.length) {
                return;
            }

            let ticking = false;

            function updateStickyHeaderShadow() {
                const progress = Math.min(window.scrollY / 40, 1);

                stickyHeaders.forEach((header) => {
                    header.style.setProperty("--sticky-shadow-opacity", progress.toFixed(3));
                });

                ticking = false;
            }

            function requestShadowUpdate() {
                if (ticking) {
                    return;
                }

                ticking = true;
                window.requestAnimationFrame(updateStickyHeaderShadow);
            }

            updateStickyHeaderShadow();
            window.addEventListener("scroll", requestShadowUpdate, { passive: true });
        })();
    </script>
</body>
</html>
