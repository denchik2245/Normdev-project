<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="{% block body_class %}{% endblock %}">
    {% block header %}
        <header>
            <div class="container">
                <h1>Система аудита веб-сайтов</h1>
                <nav>
                    <a href="/web">Главная</a>
                    <a href="/web/history">История проверок</a>
                    <a href="/docs">Swagger API</a>
                </nav>
            </div>
        </header>
    {% endblock %}

    <main class="{% block main_wrapper_class %}container{% endblock %} {% block main_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>
    <script>
        (function () {
            const root = document.documentElement;
            const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

            if (!prefersReducedMotion) {
                root.classList.add("page-enter");

                window.requestAnimationFrame(() => {
                    window.requestAnimationFrame(() => {
                        root.classList.remove("page-enter");
                    });
                });

                document.addEventListener("click", (event) => {
                    if (!(event.target instanceof Element)) {
                        return;
                    }

                    const link = event.target.closest("a[href]");
                    if (!link) {
                        return;
                    }

                    if (
                        event.defaultPrevented ||
                        event.button !== 0 ||
                        event.metaKey ||
                        event.ctrlKey ||
                        event.shiftKey ||
                        event.altKey ||
                        link.target === "_blank" ||
                        link.hasAttribute("download")
                    ) {
                        return;
                    }

                    const url = new URL(link.href, window.location.href);
                    const isSameOrigin = url.origin === window.location.origin;
                    const isHashOnlyNavigation =
                        url.pathname === window.location.pathname &&
                        url.search === window.location.search &&
                        url.hash &&
                        url.hash !== window.location.hash;

                    if (!isSameOrigin || isHashOnlyNavigation) {
                        return;
                    }

                    event.preventDefault();
                    root.classList.add("page-leave");

                    window.setTimeout(() => {
                        window.location.href = url.href;
                    }, 220);
                });

                window.addEventListener("pageshow", () => {
                    root.classList.remove("page-leave");
                });
            }

            const animatedHeaders = document.querySelectorAll(".home-header, .history-page header.history-header, .audit-page header.audit-header");
            if (!animatedHeaders.length) {
                return;
            }

            let ticking = false;
            let lastScrollY = window.scrollY;

            function updateHeaderState() {
                const currentScrollY = window.scrollY;
                const progress = Math.min(currentScrollY / 40, 1);
                const scrollingDown = currentScrollY > lastScrollY;
                const scrollDelta = Math.abs(currentScrollY - lastScrollY);

                animatedHeaders.forEach((header) => {
                    header.style.setProperty("--sticky-shadow-opacity", progress.toFixed(3));

                    if (currentScrollY <= 24) {
                        header.classList.remove("header-hidden");
                        return;
                    }

                    if (scrollDelta < 8) {
                        return;
                    }

                    if (scrollingDown) {
                        header.classList.add("header-hidden");
                    } else {
                        header.classList.remove("header-hidden");
                    }
                });

                lastScrollY = currentScrollY;
                ticking = false;
            }

            function requestHeaderUpdate() {
                if (ticking) {
                    return;
                }

                ticking = true;
                window.requestAnimationFrame(updateHeaderState);
            }

            updateHeaderState();
            window.addEventListener("scroll", requestHeaderUpdate, { passive: true });
        })();
    </script>
</body>
</html>
